<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ReactSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="control-strip">

    <!-- Row 1: Logo + URL bars -->
    <div class="row-top">
      <div class="logo-area">
        <span class="logo-icon">⟳</span>
        <span class="logo-text">ReactSync</span>
        <div class="status-dot" id="statusDot"></div>
      </div>

      <div class="url-bars">
        <div class="url-row">
          <span class="tag tag-a">A</span>
          <input class="url-input" id="urlA" type="text" placeholder="youtube.com/watch?v=…" spellcheck="false" />
          <button class="btn-go" id="goA">▶</button>
        </div>
        <div class="url-row">
          <span class="tag tag-b">B</span>
          <input class="url-input" id="urlB" type="text" placeholder="youtube.com/watch?v=…" spellcheck="false" />
          <button class="btn-go" id="goB">▶</button>
        </div>
      </div>
    </div>

    <!-- Row 2: Offset controls + actions + status -->
    <div class="row-bottom">
      <div class="offset-group">
        <span class="offset-label-text">Offset</span>
        <button class="nudge-btn" id="nudgeDown">−</button>
        <div class="offset-input-wrap">
          <input type="number" id="offsetInput" class="offset-input" value="0" step="0.5" min="-9999" max="9999" />
          <span class="offset-unit">sec</span>
        </div>
        <button class="nudge-btn" id="nudgeUp">+</button>

        <div class="nudge-sizes">
          <span class="nudge-label">nudge:</span>
          <button class="nudge-size-btn active" data-size="0.5">0.5s</button>
          <button class="nudge-size-btn" data-size="1">1s</button>
          <button class="nudge-size-btn" data-size="5">5s</button>
        </div>

        <button class="btn-autodetect" id="autoDetectBtn" disabled>◎ auto-detect</button>

        <div class="autodetect-result" id="autoDetectResult" hidden>
          <span class="autodetect-label">detected:</span>
          <span class="autodetect-value" id="autoDetectValue"></span>
          <button class="btn-apply" id="applyDetectedBtn">apply</button>
          <button class="btn-dismiss" id="dismissDetectedBtn">✕</button>
        </div>
      </div>

      <div class="actions-group">
        <button class="btn-sync" id="syncBtn">SYNC</button>
        <button class="btn-clear" id="clearBtn">CLEAR</button>
        <div class="status-bar" id="statusBar">Load a video in each panel, then hit SYNC</div>
      </div>
    </div>

  </div>
  <script src="renderer.js"></script>
</body>
</html>
