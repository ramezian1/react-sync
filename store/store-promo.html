<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReactSync — Store Promo Tile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 440px;
      height: 280px;
      overflow: hidden;
      background: #0a0a0c;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 400px;
      height: 240px;
      background: #18181c;
      border-radius: 16px;
      border: 1px solid #2a2a30;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
      overflow: hidden;
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00e5a0 30%, #00e5a0 70%, transparent);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    .icon {
      width: 56px;
      height: 56px;
      position: relative;
      flex-shrink: 0;
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    .wordmark {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 36px;
      color: #e2e2e6;
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .wordmark span {
      color: #00e5a0;
    }

    .tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #6b6b78;
      letter-spacing: 0.01em;
      margin-bottom: 24px;
    }

    .sites {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 340px;
    }

    .site-pill {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #9b9ba8;
      background: #0e0e10;
      border: 1px solid #2a2a30;
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* Screenshot helper */
    .hint {
      position: fixed;
      bottom: 6px;
      left: 0; right: 0;
      text-align: center;
      font-family: sans-serif;
      font-size: 11px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="icon">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Sync arc: 270° clockwise, gap at bottom-right -->
          <path
            d="M 28 8
               A 20 20 0 1 1 47.14 33.14"
            stroke="#00e5a0"
            stroke-width="4.5"
            stroke-linecap="round"
            fill="none"
          />
          <!-- Arrowhead at end of arc -->
          <polygon
            points="47.14,33.14 40,27 52,26"
            fill="#00e5a0"
          />
        </svg>
      </div>
      <div class="wordmark">React<span>Sync</span></div>
    </div>

    <div class="tagline">Sync reaction videos with source videos across browser tabs</div>

    <div class="sites">
      <span class="site-pill">YouTube</span>
      <span class="site-pill">Patreon</span>
      <span class="site-pill">Netflix</span>
      <span class="site-pill">Disney+</span>
      <span class="site-pill">Twitch</span>
      <span class="site-pill">Vimeo</span>
      <span class="site-pill">Prime Video</span>
      <span class="site-pill">+ more</span>
    </div>
  </div>

  <div class="hint">Open in Chrome → zoom 100% → screenshot the card (400×240) → crop to 440×280</div>
</body>
</html>
