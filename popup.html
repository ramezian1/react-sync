<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReactSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">⟳</span>
        <span class="logo-text">ReactSync</span>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">◑</button>
      <div class="status-dot" id="statusDot"></div>
    </header>

    <!-- Tab A -->
    <div class="tab-row">
      <div class="tab-label reaction">
        <span class="tag">A</span>
        <span>Reaction Video</span>
      </div>
      <img class="tab-fav" id="tabAFav" src="" hidden />
      <select class="tab-select" id="tabASelect">
        <option value="">— select tab —</option>
      </select>
    </div>

    <!-- Tab B -->
    <div class="tab-row">
      <div class="tab-label source">
        <span class="tag">B</span>
        <span>Source Video</span>
      </div>
      <img class="tab-fav" id="tabBFav" src="" hidden />
      <select class="tab-select" id="tabBSelect">
        <option value="">— select tab —</option>
      </select>
    </div>

    <!-- Audio Source (revealed after SYNC) -->
    <div class="audio-row" id="audioRow" hidden>
      <span class="audio-label">🔊 Audio</span>
      <div class="audio-options">
        <button class="audio-btn" data-audio="A">Tab A</button>
        <button class="audio-btn" data-audio="B">Tab B</button>
        <button class="audio-btn active" data-audio="both">Both</button>
      </div>
    </div>

    <!-- Offset -->
    <div class="offset-section">
      <div class="offset-label">
        <span>Offset</span>
        <span class="offset-hint">A is ahead by</span>
      </div>
      <div class="offset-controls">
        <button class="nudge-btn" id="nudgeDown">−</button>
        <div class="offset-input-wrap">
          <input type="number" id="offsetInput" class="offset-input" value="0" step="0.5" min="-9999" max="9999" />
          <span class="offset-unit">sec</span>
        </div>
        <button class="nudge-btn" id="nudgeUp">+</button>
      </div>
      <div class="nudge-size-row">
        <span class="nudge-label">nudge:</span>
        <button class="nudge-size-btn active" data-size="0.5">0.5s</button>
        <button class="nudge-size-btn" data-size="1">1s</button>
        <button class="nudge-size-btn" data-size="5">5s</button>
      </div>

      <div class="autodetect-row">
        <button class="btn-autodetect" id="autoDetectBtn" disabled>◎ auto-detect offset</button>
        <div class="autodetect-result" id="autoDetectResult" hidden>
          <span class="autodetect-label">detected:</span>
          <span class="autodetect-value" id="autoDetectValue"></span>
          <button class="btn-apply" id="applyDetectedBtn">apply</button>
          <button class="btn-dismiss" id="dismissDetectedBtn">✕</button>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="btn-sync" id="syncBtn">SYNC</button>
      <button class="btn-clear" id="clearBtn">CLEAR</button>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      Select two tabs and hit SYNC
    </div>

    <!-- Footer row -->
    <div class="footer-row">
      <button class="refresh-btn" id="refreshBtn">↻ refresh tabs</button>
      <div class="footer-links">
        <button class="shortcuts-btn" id="shortcutsBtn" title="Keyboard shortcuts">⌨ shortcuts</button>
        <span class="footer-sep">·</span>
        <button class="donate-btn" id="donateBtn" title="Support development">♥ sponsor</button>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
